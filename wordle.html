              myStorage.setItem(new Date().toLocaleString(), (level + 4) / 5);
              console.log(myStorage);
            } else {
              document.getElementById("status").innerHTML =
                "You guessed " +
                (correct + included) +
                " letters that were in the word<br>" +
                correct +
                " were in the right spot";
            }
          }
          level += 5;
        } else {
          document.getElementById("status").innerHTML = "Invalid word";
        }
      };

      var input = document.getElementById("wordInput");
      input.addEventListener("keyup", function (event) {
        if (event.keyCode === 13) {
          console.log("hm");
          // Cancel the default action, if needed
          //event.preventDefault();
          // Trigger the button element with a click
          addWord();
          input.value = "";
        }
      });

      var reset = function () {
        keyWord = words[Math.floor(Math.random() * words.length)].toUpperCase();
        document.getElementById("wordInput").value = "";
        level = 1;
        for (i = 0; i < 30; i++) {
          document.getElementById("d" + (level + i)).style.backgroundColor =
            "#555555";
          document.getElementById("l" + (level + i)).style.color = "white";
          document.getElementById("l" + (level + i)).innerHTML = "";
        }
      };

      var showStats = function () {
        guessFreqs = [];
        for (i = 0; i < myStorage.length; i++) {
          var key = myStorage.key(i);
          var value = myStorage.getItem(key);
          guessFreqs.push(parseInt(value));
          console.log(guessFreqs);
        }
        document.getElementById("statsText").innerHTML =
          "Average Guesses: " +
          guessFreqs.reduce(function (a, b) {
            return a + b;
          }) /
            guessFreqs.length;
      };

      var validWord = function (word) {
        let definition = "";
        const fetchWord = fetch(
          "https://api.dictionaryapi.dev/api/v2/entries/en/" + word
        );
        fetchWord
          .then((response) => {
            return response.json();
          })
          .then((json) => {
            definition = json[0].word;
          })
          .catch(() => false);
        console.log(definition);
        return definition != "No Definitions Found";
      };
